<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Breakdown Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-color: #115f66;
            --primary-light: #18838d;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .top-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .control-panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border-color);
        }

        .upload-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .upload-btn:hover {
            background-color: var(--primary-light);
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            font-weight: 500;
            color: var(--text-muted);
            min-width: 150px;
        }

        .filter-group {
            display: none;
            align-items: center;
            gap: 0.5rem;
            border-left: 2px solid var(--bg-color);
            padding-left: 1.5rem;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            min-width: 200px;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        .dashboard {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.5rem;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        .full-width {
            grid-column: 1 / -1;
            height: 500px;
        }
        
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            grid-column: 1 / -1;
        }
        
        .stat-card {
            flex: 1;
            background: var(--primary-color);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-card h4 {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        #error-message {
            display: none;
            color: white;
            background-color: #ff6b6b;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem auto;
            max-width: 800px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Grievance Breakdown Dashboard</h1>
        <p>Analyze evaluation scores and grievance distributions by Admin Area and Department.</p>
    </div>

    <div id="error-message"></div>

    <div class="top-controls">
        <div class="control-panel">
            <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
            <label for="excel-file" class="upload-btn">
                <svg style="width:20px; height:20px; margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Upload File
            </label>
            <span class="file-name" id="file-name">No file chosen</span>

            <div class="filter-group" id="filter-group">
                <label for="adminAreaSelect"><strong>Admin Area:</strong></label>
                <select id="adminAreaSelect"></select>
            </div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="stats-row">
            <div class="stat-card">
                <h4>Total Grievances in Area</h4>
                <div class="value" id="totalGrievances">0</div>
            </div>
            <div class="stat-card">
                <h4>Departments Affected</h4>
                <div class="value" id="totalDepts">0</div>
            </div>
        </div>

        <div class="card full-width">
            <h3>Score Breakdown by Department</h3>
            <div class="chart-container" style="height: 400px;">
                <canvas id="deptScoreChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Overall Score Distribution (Selected Area)</h3>
            <div class="chart-container">
                <canvas id="scoreDistChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Total Grievances by Department</h3>
            <div class="chart-container">
                <canvas id="deptTotalChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let globalData = [];
        let charts = [];

        const scoreColors = {
            '1': '#ff6b6b', // Red
            '2': '#feca57', // Orange
            '3': '#1dd1a1', // Green
            '4': '#18838d', // Teal Light
            '5': '#115f66', // Teal Dark
            'default': '#a8d5d9'
        };

        function showError(msg) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.innerHTML = msg;
            errorDiv.style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        document.getElementById('excel-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            hideError();
            document.getElementById('file-name').textContent = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const rawData = XLSX.utils.sheet_to_json(worksheet, { defval: "" }); // defval ensures empty cells are kept
                    
                    if (rawData.length === 0) {
                        showError("The uploaded Excel sheet appears to be empty.");
                        return;
                    }

                    // CLEANUP: Remove leading/trailing spaces from column headers
                    globalData = rawData.map(row => {
                        let cleanRow = {};
                        for (let key in row) {
                            cleanRow[key.trim()] = row[key];
                        }
                        return cleanRow;
                    });

                    // VALIDATION: Check if required columns exist
                    const firstRowKeys = Object.keys(globalData[0]);
                    const missingColumns = [];
                    if (!firstRowKeys.includes('Admin Area')) missingColumns.push('Admin Area');
                    if (!firstRowKeys.includes('Department')) missingColumns.push('Department');
                    if (!firstRowKeys.includes('2025 Evaluation Score')) missingColumns.push('2025 Evaluation Score');

                    if (missingColumns.length > 0) {
                        showError(`<strong>Error:</strong> Could not find the following required columns: <em>${missingColumns.join(', ')}</em>.<br><br>Here are the columns the tool actually found in your file: <em>${firstRowKeys.join(', ')}</em>.<br><br>Please rename the columns in your Excel file to match exactly.`);
                        return;
                    }

                    setupFilters();
                } catch (err) {
                    showError("An error occurred while reading the file. Ensure it is a valid Excel (.xlsx) file.");
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function setupFilters() {
            // Get unique admin areas, filtering out empty ones
            const adminAreas = [...new Set(globalData.map(row => {
                const area = row['Admin Area'];
                return typeof area === 'string' ? area.trim() : area;
            }).filter(area => area && area !== ""))].sort();
            
            if (adminAreas.length === 0) {
                showError("Could not find any data in the 'Admin Area' column.");
                return;
            }

            const select = document.getElementById('adminAreaSelect');
            select.innerHTML = ''; 
            
            adminAreas.forEach(area => {
                const option = document.createElement('option');
                option.value = area;
                option.textContent = area;
                select.appendChild(option);
            });

            document.getElementById('filter-group').style.display = 'flex';
            select.addEventListener('change', updateDashboard);
            
            // Trigger first update
            updateDashboard();
        }

        function updateDashboard() {
            const selectedArea = document.getElementById('adminAreaSelect').value;
            
            // Filter data for the selected Admin Area, handling spacing issues
            const filteredData = globalData.filter(row => {
                const area = row['Admin Area'];
                return (typeof area === 'string' ? area.trim() : area) === selectedArea;
            });
            
            document.getElementById('dashboard').style.display = 'grid';

            // Clean department names and handle empty values
            const uniqueDepts = new Set(filteredData.map(row => {
                const dept = row['Department'];
                return typeof dept === 'string' ? dept.trim() : dept;
            }).filter(dept => dept && dept !== "")).size;

            document.getElementById('totalGrievances').textContent = filteredData.length;
            document.getElementById('totalDepts').textContent = uniqueDepts;

            charts.forEach(chart => chart.destroy());
            charts = [];

            // --- DATA PROCESSING ---
            const scoreCounts = {};
            const deptStats = {};
            const allScoresSet = new Set();

            filteredData.forEach(row => {
                let dept = row['Department'];
                dept = typeof dept === 'string' ? dept.trim() : dept;
                if (!dept || dept === "") dept = 'Unknown';

                let score = row['2025 Evaluation Score'];
                score = String(score).trim();
                if (!score || score === "undefined") score = 'N/A';

                // Process Overall Distribution
                scoreCounts[score] = (scoreCounts[score] || 0) + 1;

                // Process Department Data
                allScoresSet.add(score);
                if (!deptStats[dept]) {
                    deptStats[dept] = { total: 0, scores: {} };
                }
                deptStats[dept].total += 1;
                deptStats[dept].scores[score] = (deptStats[dept].scores[score] || 0) + 1;
            });

            const departments = Object.keys(deptStats).sort((a, b) => deptStats[b].total - deptStats[a].total);
            const allScores = Array.from(allScoresSet).sort();

            // --- DRAW CHARTS ---

            const datasetsStacked = allScores.map(score => {
                return {
                    label: `Score: ${score}`,
                    data: departments.map(dept => deptStats[dept].scores[score] || 0),
                    backgroundColor: scoreColors[score] || scoreColors.default,
                };
            });

            const ctx1 = document.getElementById('deptScoreChart').getContext('2d');
            charts.push(new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: departments,
                    datasets: datasetsStacked
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true, title: { display: true, text: 'Number of Grievances' } }
                    }
                }
            }));

            const ctx2 = document.getElementById('scoreDistChart').getContext('2d');
            charts.push(new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(scoreCounts).sort(),
                    datasets: [{
                        data: Object.keys(scoreCounts).sort().map(k => scoreCounts[k]),
                        backgroundColor: Object.keys(scoreCounts).sort().map(k => scoreColors[k] || scoreColors.default),
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            }));

            const ctx3 = document.getElementById('deptTotalChart').getContext('2d');
            charts.push(new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: departments,
                    datasets: [{
                        label: 'Total Grievances',
                        data: departments.map(dept => deptStats[dept].total),
                        backgroundColor: '#115f66',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { beginAtZero: true }
                    }
                }
            }));
        }
    </script>
</body>
</html>
