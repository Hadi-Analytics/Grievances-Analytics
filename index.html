<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Moved</title>
    <style>
        :root {
            --primary-color: #115f66; 
            --primary-hover: #0d4a50; 
            --bg-color: #f4f7f7;
            --text-main: #1a2b2c;
            --text-muted: #546b6d;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.03);
            padding: 48px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .icon-container {
            background-color: #EEF2FF;
            color: var(--primary-color);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 14px 28px;
            border-radius: 8px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.631 8.41m5.96 5.96a14.926 14.926 0 0 1-5.841 2.58m-.119-8.54a6 6 0 0 0-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 0 0-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 0 1-2.448-2.45m.002 2.45a15.11 15.11 0 0 1 2.448-2.45m-2.448 2.45L5.49 20.89a.75.75 0 0 1-1.06-1.06l5.34-5.34m0 0a15.11 15.11 0 0 1-2.45-2.448m2.45 2.448c.02-.104.04-.208.06-.311" />
            </svg>
        </div>
        
        <h1>We've Moved to a New Home</h1>
        <p>The dashboard has been moved to a new server. Please update your bookmarks and head over to our new professional link.</p>
        
        <a href="https://kfupm-hr-analytics.github.io/Grievance-Dashboard/" class="btn">
            Go to the New Dashboard
        </a>
    </div>

</body>
</html>
