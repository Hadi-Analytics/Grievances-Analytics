<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Data Inspector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-color: #115f66;
            --primary-light: #18838d;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 0.5rem; }

        .control-panel {
            background: var(--card-bg); padding: 1.5rem; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center;
            border: 1px solid var(--border-color); max-width: 600px; margin: 0 auto 2rem auto;
        }

        .btn {
            background-color: var(--primary-color); color: white; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex;
            align-items: center; transition: background-color 0.3s ease;
        }
        .btn:hover { background-color: var(--primary-light); }
        input[type="file"] { display: none; }

        .inspector-panel {
            display: none; background: var(--card-bg); padding: 1.5rem;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 1200px; margin: 0 auto; overflow-x: auto;
        }

        .inspector-panel h3 { color: #d35400; margin-bottom: 1rem; border-bottom: 2px solid var(--bg-color); padding-bottom: 0.5rem; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: left; white-space: nowrap; }
        th { background-color: var(--primary-color); color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .empty-cell { color: #999; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Data Inspector Tool</h1>
        <p>Let's see exactly how the computer is reading your HR export file.</p>
    </div>

    <div class="control-panel">
        <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
        <label for="excel-file" class="btn">
            <svg style="width:20px; height:20px; margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            Upload File to Inspect
        </label>
        <div id="file-name" style="margin-top: 1rem; color: #666;"></div>
    </div>

    <div class="inspector-panel" id="inspector-panel">
        <h3>Raw Data View (First 5 Rows)</h3>
        <p style="margin-bottom: 1rem; color: #666;">This is exactly what the code sees. If your column header is missing here, it means the HR system export formatted it in a way the code cannot read.</p>
        <table id="debug-table">
            <thead id="debug-thead"></thead>
            <tbody id="debug-tbody"></tbody>
        </table>
    </div>

    <script>
        document.getElementById('excel-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('file-name').textContent = "Inspecting: " + file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Read as a raw array of arrays (no guessing headers)
                const rawArray = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (rawArray.length > 0) {
                    renderTable(rawArray.slice(0, 6)); // Get first 6 rows (1 header + 5 data)
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function renderTable(dataArray) {
            document.getElementById('inspector-panel').style.display = 'block';
            const thead = document.getElementById('debug-thead');
            const tbody = document.getElementById('debug-tbody');
            
            thead.innerHTML = '';
            tbody.innerHTML = '';

            // Find the maximum number of columns in these rows to build an even table
            let maxCols = 0;
            dataArray.forEach(row => { if (row.length > maxCols) maxCols = row.length; });

            // Render Header (Row 0)
            const headerRow = document.createElement('tr');
            for (let i = 0; i < maxCols; i++) {
                const th = document.createElement('th');
                th.textContent = dataArray[0][i] !== undefined ? dataArray[0][i] : '[BLANK]';
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);

            // Render Data (Rows 1 to 5)
            for (let r = 1; r < dataArray.length; r++) {
                const tr = document.createElement('tr');
                for (let c = 0; c < maxCols; c++) {
                    const td = document.createElement('td');
                    if (dataArray[r][c] !== undefined && dataArray[r][c] !== "") {
                        td.textContent = dataArray[r][c];
                    } else {
                        td.textContent = "Empty";
                        td.className = "empty-cell";
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }
    </script>
</body>
</html>
